version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: finterm
      POSTGRES_USER: finterm
      POSTGRES_PASSWORD: finterm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://finterm:finterm@postgres:5432/finterm
      REDIS_URL: redis://redis:6379/0
      MARKET_DATA_PROVIDER: mock
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  postgres_data:
